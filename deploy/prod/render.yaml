services:
  - type: web
    name: wildlens-api-prod
    env: docker
    dockerfilePath: ./Dockerfile
    region: frankfurt
    plan: free
    autoDeploy: false
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_SCHEMA
        value: wildlens_prod
      - key: APP_URL
        value: https://wildlens-api-prod.onrender.com
      - key: DB_URL
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
