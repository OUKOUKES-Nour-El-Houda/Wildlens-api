spring.application.name=wildlensApi
server.port=8082
spring.main.web-application-type=servlet
server.address=0.0.0.0

jwt.secret=${JWT_SECRET:localDevSecretPleaseChange}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.schema=${DB_SCHEMA:public}
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

spring.flyway.enabled=true
spring.flyway.create-schemas=true
spring.flyway.default-schema=${DB_SCHEMA:public}
spring.flyway.locations=classpath:db/migration

app.wildlens-prefix-url=${APP_URL:http://localhost:8082}

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never