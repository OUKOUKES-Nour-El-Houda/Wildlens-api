name: CI - Build, Test & Quality

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

# Permissions nécessaires pour pousser l'image vers GitHub Container Registry
permissions:
  contents: read
  packages: write

jobs:

  # ─────────────────────────────────────────────────────────────
  # JOB 1 — Compilation
  # Vérifie que le code compile sans erreur.
  # Produit un artifact (le JAR compilé) réutilisé par les jobs suivants
  # pour éviter de recompiler plusieurs fois.
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          # Cache Maven : les dépendances sont mises en cache entre les runs
          # pour ne pas les retélécharger à chaque fois (~30s économisés)
          cache: maven

      - name: Compile
        run: ./mvnw compile -DskipTests

      # On sauvegarde les classes compilées comme artifact
      # Les jobs suivants le téléchargent au lieu de recompiler
      - name: Save compiled classes
        uses: actions/upload-artifact@v4
        with:
          name: compiled-classes
          path: target/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────
  # JOB 2 — Tests
  # Lance les tests unitaires.
  # Démarre une vraie base PostgreSQL via Docker pour reproduire
  # les conditions de production (pas de base H2 en mémoire).
  # Attend la fin du job build pour réutiliser les classes compilées.
  # ─────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: wildlens_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      # On récupère les classes déjà compilées par le job build
      - name: Restore compiled classes
        uses: actions/download-artifact@v4
        with:
          name: compiled-classes
          path: target/

      - name: Run tests
        run: ./mvnw test
        env:
          SPRING_PROFILES_ACTIVE: dev
          DB_URL: jdbc:postgresql://localhost:5432/wildlens_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_SCHEMA: wildlens_test
          JWT_SECRET: ciTestSecret
          APP_URL: http://localhost:8082

      # Publier le rapport de tests même si les tests échouent
      # Permet de voir quels tests ont échoué directement sur GitHub
      - name: Publish test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # JOB 3 — Qualité du code (SonarQube)
  # Analyse statique : bugs potentiels, code smells, couverture.
  # Conditionnel : ignoré si le secret SONAR_HOST_URL n'est pas configuré.
  # ─────────────────────────────────────────────────────────────
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: test
    env:
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: SonarQube Scan
        if: ${{ env.SONAR_HOST_URL != '' }}
        run: ./mvnw sonar:sonar
          -Dsonar.projectKey=Projet-Wildlens
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: SonarQube non configuré
        if: ${{ env.SONAR_HOST_URL == '' }}
        run: echo "SONAR_HOST_URL non configuré — analyse ignorée."

  # ─────────────────────────────────────────────────────────────
  # JOB 4 — Build et push de l'image Docker vers le registry
  # Construit l'image Docker en multi-stage (build + runtime léger).
  # Pousse l'image vers GitHub Container Registry (GHCR) avec :
  #   - un tag basé sur le SHA du commit (traçabilité exacte)
  #   - un tag basé sur la branche (latest, main, develop)
  # Uniquement sur push (pas sur les PRs pour ne pas polluer le registry).
  # ─────────────────────────────────────────────────────────────
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Authentification sur GitHub Container Registry avec le token GitHub
      # automatiquement disponible dans chaque workflow (pas besoin de secret)
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extraction automatique des tags et labels depuis les métadonnées Git
      # Génère : ghcr.io/user/wildlens-api:sha-abc123 + ghcr.io/user/wildlens-api:develop
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/wildlens-api
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch

      # Build multi-plateforme + push vers GHCR en une seule étape
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache des layers Docker entre les runs pour accélérer le build
          cache-from: type=gha
          cache-to: type=gha,mode=max
