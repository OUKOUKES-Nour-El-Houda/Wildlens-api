name: CI — Build, Test & Quality

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:

  # ─────────────────────────────────────────
  # JOB 1 — Compilation
  # ─────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Compile
        run: ./mvnw compile -DskipTests

  # ─────────────────────────────────────────
  # JOB 2 — Tests unitaires
  # ─────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: wildlens_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Run tests
        run: ./mvnw test
        env:
          SPRING_PROFILES_ACTIVE: dev
          DB_URL: jdbc:postgresql://localhost:5432/wildlens_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_SCHEMA: wildlens_test
          JWT_SECRET: ciTestSecret
          APP_URL: http://localhost:8082

      - name: Publish test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: target/surefire-reports/

  # ─────────────────────────────────────────
  # JOB 3 — Qualité du code (SonarQube)
  # Ignoré si le secret SONAR_HOST_URL n'est pas configuré
  # ─────────────────────────────────────────
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: test
    env:
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: SonarQube Scan
        if: ${{ env.SONAR_HOST_URL != '' }}
        run: ./mvnw sonar:sonar
          -Dsonar.projectKey=Projet-Wildlens
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: SonarQube non configuré
        if: ${{ env.SONAR_HOST_URL == '' }}
        run: echo "SONAR_HOST_URL non configuré — analyse ignorée. Ajouter le secret pour activer."

  # ─────────────────────────────────────────
  # JOB 4 — Build image Docker
  # Vérifie que le Dockerfile est valide
  # ─────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t wildlens-api:${{ github.sha }} .
