name: CD — Deploy to Staging

on:
  push:
    branches: [develop]

jobs:
  deploy-staging:
    name: Deploy to Render Staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger Render deploy
        run: curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_STAGING }}"

      - name: Attendre le démarrage et vérifier la santé
        run: |
          echo "Déploiement en cours, attente 90s (cold start inclus)..."
          sleep 90
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://wildlens-api-staging.onrender.com/actuator/health || echo "000")
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Health check échoué (status $STATUS)"
            exit 1
          fi
          echo "Staging opérationnel ✓"
