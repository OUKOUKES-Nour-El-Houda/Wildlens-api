name: CD - Deploy to Staging

on:
  workflow_run:
    workflows: ["CI - Build, Test & Quality"]
    types: [completed]
    branches: [develop]

jobs:
  deploy-staging:
    name: Deploy to Render Staging
    runs-on: ubuntu-latest
    environment: staging
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Verify image in GHCR
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          IMAGE="ghcr.io/${OWNER}/wildlens-api:sha-${SHORT_SHA}"
          echo "Vérification de l'image : $IMAGE"
          docker manifest inspect "$IMAGE" \
            && echo "Image confirmée dans GHCR ✓" \
            || (echo "Image introuvable : $IMAGE" && exit 1)

      - name: Deploy to Render
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          echo "Déploiement : ghcr.io/${OWNER}/wildlens-api:sha-${SHORT_SHA}"
          curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_STAGING }}"

      - name: Health check
        run: |
          echo "Attente du démarrage (90s)..."
          sleep 90
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://wildlens-api-staging.onrender.com/actuator/health || echo "000")
          echo "Status: $STATUS"
          [ "$STATUS" = "200" ] && echo "Staging OK ✓" || (echo "Health check échoué" && exit 1)
