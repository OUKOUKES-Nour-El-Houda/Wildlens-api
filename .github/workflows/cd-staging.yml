name: CD - Deploy to Staging

on:
  workflow_run:
    workflows: ["CI - Build, Test & Quality"]
    types: [completed]
    branches: [develop]

jobs:
  deploy-staging:
    name: Deploy to Render Staging
    runs-on: ubuntu-latest
    environment: staging
    # Condition stricte : uniquement après un PUSH (pas une PR) et si CI réussie
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Render
        run: |
          echo "Déploiement staging — commit ${{ github.event.workflow_run.head_sha }}"
          curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_STAGING }}"

      - name: Health check
        run: |
          echo "Attente du démarrage (90s)..."
          sleep 90
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://wildlens-api-staging.onrender.com/actuator/health || echo "000")
          echo "Status: $STATUS"
          [ "$STATUS" = "200" ] && echo "Staging OK ✓" || (echo "Health check échoué" && exit 1)
