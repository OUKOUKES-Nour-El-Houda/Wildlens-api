name: CD - Deploy to Production

on:
  workflow_run:
    workflows: ["CI - Build, Test & Quality"]
    types: [completed]
    branches: [main]

jobs:
  deploy-prod:
    name: Deploy to Render Production
    runs-on: ubuntu-latest
    environment: production
    # Uniquement sur push, CI réussie, et pas un commit du release bot
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      !startsWith(github.event.workflow_run.head_commit.message, 'release:') &&
      !startsWith(github.event.workflow_run.head_commit.message, 'chore: prepare next')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          git fetch --tags
          TAG=$(git tag -l "v*" | sort -V | tail -n1)
          echo "tag=${TAG:-non-versionné}" >> $GITHUB_OUTPUT

      - name: Deploy to Render
        run: |
          echo "Déploiement production — version ${{ steps.version.outputs.tag }}"
          curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_PROD }}"

      - name: Health check
        run: |
          echo "Attente du démarrage (90s)..."
          sleep 90
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://wildlens-api-prod.onrender.com/actuator/health || echo "000")
          echo "Status: $STATUS"
          [ "$STATUS" = "200" ] && echo "Production OK ✓" || (echo "Health check échoué" && exit 1)
