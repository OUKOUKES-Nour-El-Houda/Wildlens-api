name: Release — Versioning sémantique

on:
  workflow_run:
    workflows: ["CI - Build, Test & Quality"]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    # Ne tourne QUE sur push, CI réussie, ET pas un commit du release bot
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      !startsWith(github.event.workflow_run.head_commit.message, 'release:') &&
      !startsWith(github.event.workflow_run.head_commit.message, 'chore: prepare next')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Compute next version
        id: version
        run: |
          git fetch --tags
          LATEST=$(git tag -l "v*" | sort -V | tail -n1)

          if [ -z "$LATEST" ]; then
            NEXT="1.0.0"
          else
            COMMIT_MSG=$(git log -1 --pretty=%B)
            MAJOR=$(echo $LATEST | tr -d 'v' | cut -d. -f1)
            MINOR=$(echo $LATEST | tr -d 'v' | cut -d. -f2)
            PATCH=$(echo $LATEST | tr -d 'v' | cut -d. -f3)

            if echo "$COMMIT_MSG" | grep -qE "^feat(\(.+\))?!:|BREAKING CHANGE"; then
              MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
            elif echo "$COMMIT_MSG" | grep -qE "^feat(\(.+\))?:"; then
              MINOR=$((MINOR + 1)); PATCH=0
            else
              PATCH=$((PATCH + 1))
            fi

            NEXT="${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "version=$NEXT" >> $GITHUB_OUTPUT
          echo "tag=v$NEXT" >> $GITHUB_OUTPUT
          echo "next_snapshot=${NEXT%.*}.$((${NEXT##*.} + 1))-SNAPSHOT" >> $GITHUB_OUTPUT
          echo "Prochaine version : $NEXT"

      - name: Set release version in pom.xml
        run: |
          ./mvnw versions:set -DnewVersion=${{ steps.version.outputs.version }} -DgenerateBackupPoms=false
          git add pom.xml
          git commit -m "release: ${{ steps.version.outputs.tag }}"

      - name: Create Git tag
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin main --follow-tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Release ${{ steps.version.outputs.tag }}"
          generate_release_notes: true

      - name: Tag Docker image with version
        run: |
          OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          SHORT_SHA=$(echo ${{ github.event.workflow_run.head_sha }} | cut -c1-7)
          SHA_IMAGE="ghcr.io/${OWNER}/wildlens-api:sha-${SHORT_SHA}"

          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker pull $SHA_IMAGE
          docker tag $SHA_IMAGE ghcr.io/${OWNER}/wildlens-api:${{ steps.version.outputs.tag }}
          docker tag $SHA_IMAGE ghcr.io/${OWNER}/wildlens-api:latest
          docker push ghcr.io/${OWNER}/wildlens-api:${{ steps.version.outputs.tag }}
          docker push ghcr.io/${OWNER}/wildlens-api:latest
          echo "Image taguée : ${{ steps.version.outputs.tag }} + latest ✓"

      - name: Bump to next SNAPSHOT version
        run: |
          ./mvnw versions:set -DnewVersion=${{ steps.version.outputs.next_snapshot }} -DgenerateBackupPoms=false
          git add pom.xml
          git commit -m "chore: prepare next development iteration ${{ steps.version.outputs.next_snapshot }}"
          git push origin main
