name: Release — Versioning sémantique

# Se déclenche automatiquement après chaque merge sur main
# Crée un tag de version (v1.0.0, v1.0.1, ...) et une GitHub Release
on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:

  # ─────────────────────────────────────────────────────────────
  # JOB 1 — Calcul et création du tag de version
  # Lit le dernier tag vX.Y.Z, incrémente le patch automatiquement.
  # Convention : feat → minor, fix/autres → patch (à adapter selon les commits)
  # ─────────────────────────────────────────────────────────────
  tag-version:
    name: Create Version Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          # Récupère le dernier tag de version (format vX.Y.Z)
          LATEST=$(git tag -l "v*" | sort -V | tail -n1)

          if [ -z "$LATEST" ]; then
            NEXT="v1.0.0"
          else
            # Détecte si le dernier commit est une feature (minor bump) ou un fix (patch bump)
            COMMIT_MSG=$(git log -1 --pretty=%B)
            MAJOR=$(echo $LATEST | cut -d. -f1 | tr -d 'v')
            MINOR=$(echo $LATEST | cut -d. -f2)
            PATCH=$(echo $LATEST | cut -d. -f3)

            if echo "$COMMIT_MSG" | grep -q "^feat"; then
              MINOR=$((MINOR + 1))
              PATCH=0
            else
              PATCH=$((PATCH + 1))
            fi

            NEXT="v${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "version=${NEXT#v}" >> $GITHUB_OUTPUT
          echo "tag=$NEXT" >> $GITHUB_OUTPUT
          echo "Nouvelle version : $NEXT"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Release ${{ steps.version.outputs.tag }}"
          generate_release_notes: true
          prerelease: false

  # ─────────────────────────────────────────────────────────────
  # JOB 2 — Tag l'image Docker dans GHCR avec la version sémantique
  # L'image sha-abc123 et develop existent déjà (créées par la CI).
  # On ajoute ici le tag v1.0.0 et latest pour la production.
  # ─────────────────────────────────────────────────────────────
  tag-docker-image:
    name: Tag Docker Image with Version
    runs-on: ubuntu-latest
    needs: tag-version

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag image with semantic version
        run: |
          SHA_TAG="ghcr.io/${{ github.repository_owner }}/wildlens-api:sha-$(echo ${{ github.sha }} | cut -c1-7)"
          VERSION_TAG="ghcr.io/${{ github.repository_owner }}/wildlens-api:${{ needs.tag-version.outputs.tag }}"
          LATEST_TAG="ghcr.io/${{ github.repository_owner }}/wildlens-api:latest"

          # Pull l'image du commit, retague avec la version et latest
          docker pull $SHA_TAG
          docker tag $SHA_TAG $VERSION_TAG
          docker tag $SHA_TAG $LATEST_TAG
          docker push $VERSION_TAG
          docker push $LATEST_TAG

          echo "Image taguée : $VERSION_TAG"
          echo "Image taguée : $LATEST_TAG"
