version: 2
updates:

  # Mise à jour automatique des dépendances Maven (Spring Boot, JWT, etc.)
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "java"
    open-pull-requests-limit: 5

  # Mise à jour automatique des actions GitHub (checkout, setup-java, etc.)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"

  # Mise à jour automatique de l'image de base Docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "docker"
